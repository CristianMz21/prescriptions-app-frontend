sonar.projectKey=CristianMz21_prescriptions-app-frontend
sonar.organization=cristianmz21

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8

# Files Sonar never analyses (issues, coverage, duplication, security).
# Generated code is the load-bearing exclusion here: `src/lib/api/generated/**`
# is produced by Orval from the backend OpenAPI spec and regenerated on every
# `pnpm api:refresh`. Analysing it would report issues we cannot fix at root
# (they live in the generator template, not our source) and would dominate
# the "new code" line count, pushing legitimate new-code coverage targets
# out of reach.
sonar.exclusions=\
  node_modules/**,\
  coverage/**,\
  .next/**,\
  dist/**,\
  out/**,\
  build/**,\
  public/**,\
  e2e/**,\
  scripts/**,\
  src/lib/api/generated/**,\
  *.config.js,\
  *.config.ts,\
  *.config.mjs,\
  next-env.d.ts

# Files counted for issues/duplication but not for coverage. Server-side
# Next.js layouts/pages are excluded because they orchestrate auth + redirects
# and are integration-tested in `e2e/` (Playwright covers the user-visible
# behaviour end-to-end); unit-testing them requires Next-internal mocks that
# don't add real signal.
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/*.stories.ts,\
  **/*.stories.tsx,\
  **/types/**,\
  **/*.d.ts,\
  src/app/**/layout.tsx,\
  src/app/**/page.tsx,\
  src/app/**/route.ts,\
  src/app/globals.css,\
  src/middleware.ts

# Duplicate-detection exclusions: schemas and `.dto.ts` shape declarations are
# intentionally repetitive (one field per DTO, identical JSDoc patterns).
# Counting them as duplicates inflates the metric without revealing real
# duplication that should be refactored.
sonar.cpd.exclusions=\
  src/lib/api/generated/**,\
  src/**/*.dto.ts,\
  src/**/types/**
