sonar.projectKey=CristianMz21_prescriptions-app-frontend
sonar.organization=cristianmz21

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8

# Files Sonar never analyses (issues, coverage, duplication, security).
# Generated code is the load-bearing exclusion here: `src/lib/api/generated/**`
# is produced by Orval from the backend OpenAPI spec and regenerated on every
# `pnpm api:refresh`. Analysing it would report issues we cannot fix at root
# (they live in the generator template, not our source) and would dominate
# the "new code" line count, pushing legitimate new-code coverage targets
# out of reach.
sonar.exclusions=\
  node_modules/**,\
  coverage/**,\
  .next/**,\
  dist/**,\
  out/**,\
  build/**,\
  public/**,\
  e2e/**,\
  scripts/**,\
  src/lib/api/generated/**,\
  *.config.js,\
  *.config.ts,\
  *.config.mjs,\
  next-env.d.ts

# Files counted for issues but excluded from coverage measurement. The Playwright
# E2E suite (e2e/, 68 tests) drives every user-facing flow through the React
# components and Next.js routes — `pnpm test:e2e` is the load-bearing coverage
# signal for the UI layer. Vitest's lcov only sees code reachable from `*.test.*`
# files, so including UI files would penalise the project for tests that exist
# but in a different harness. Industry-standard split: Vitest covers pure-TS
# helpers in `src/lib/` (utils, routes, schemas, prescription-ui, nav, sort-config,
# api/, config/, features); Playwright covers everything React-bound (`components/`,
# `app/`, all hooks in `src/lib/hooks/` which require DOM + provider context).
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/*.stories.ts,\
  **/*.stories.tsx,\
  **/types/**,\
  **/*.d.ts,\
  src/components/**,\
  src/app/**,\
  src/middleware.ts,\
  src/lib/auth/server.ts,\
  src/lib/hooks/**,\
  src/lib/notifications.ts,\
  src/app/globals.css

# Duplicate-detection exclusions: shadcn-style UI primitives (`components/ui/`)
# are verbatim from the library; admin/doctor/patient tables share intentional
# structural similarity (same paginated/sortable shell with role-specific
# columns); DTO shape declarations are repetitive by design. Counting these
# as duplication inflates the metric without surfacing actionable duplication.
sonar.cpd.exclusions=\
  src/lib/api/generated/**,\
  src/components/ui/**,\
  src/components/admin/**,\
  src/components/doctor/**,\
  src/components/patient/**,\
  src/components/prescription/**,\
  src/components/feedback/**,\
  src/**/*.dto.ts,\
  src/**/types/**
