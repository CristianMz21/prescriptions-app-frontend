name: Frontend E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: frontend-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "11.1.1"
  BACKEND_PORT: 3000
  FRONTEND_PORT: 3001

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: prescriptions_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: frontend

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: CristianMz21/prescriptions-app-backend
          path: backend

      - name: Harden OpenAPI schema
        run: python3 frontend/scripts/harden-schema.py backend/openapi.json

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Approve build scripts
        run: cd frontend && pnpm approve-builds --all

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Install backend dependencies
        run: cd backend && pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd frontend && pnpm exec playwright install --with-deps chromium

      - name: Set frontend environment
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:${{ env.BACKEND_PORT }}
        run: |
          printf '%s\n' "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" > frontend/.env.local

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "PostgreSQL ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          echo "ERROR: PostgreSQL failed to start"
          exit 1

      - name: Start backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/prescriptions_test?schema=public
          JWT_ACCESS_SECRET: test-access-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci
          JWT_ACCESS_TTL: 15m
          JWT_REFRESH_TTL: 7d
          FRONTEND_URL: http://localhost:${{ env.FRONTEND_PORT }}
          APP_ORIGIN: http://localhost:${{ env.FRONTEND_PORT }}
          NODE_ENV: test
          PORT: ${{ env.BACKEND_PORT }}
          SEED_DEFAULT_PASSWORD: Password123!
        run: |
          cd backend
          pnpm exec prisma generate
          pnpm exec prisma migrate deploy
          pnpm exec prisma db seed
          pnpm start:dev > ../backend.log 2>&1 &
          echo $! > ../backend.pid

      - name: Wait for backend readiness
        run: |
          echo "Waiting for backend on port ${{ env.BACKEND_PORT }}..."
          for i in {1..60}; do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:${{ env.BACKEND_PORT }}/ 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" != "000" ] && [ "$HTTP_CODE" != "401" ]; then
              echo "Backend ready (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Waiting for backend... ($i/60) last code: $HTTP_CODE"
            sleep 3
          done
          echo "ERROR: Backend failed to start. Logs:"
          cat backend.log
          exit 1

      - name: Start frontend
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:${{ env.BACKEND_PORT }}
          OPENAPI_SPEC_PATH: ../backend/openapi.json
        run: |
          cd frontend
          pnpm api:refresh
          pnpm build
          pnpm exec next start -p ${{ env.FRONTEND_PORT }} > ../frontend.log 2>&1 &
          echo $! > ../frontend.pid

      - name: Wait for frontend readiness
        run: |
          echo "Waiting for frontend on port ${{ env.FRONTEND_PORT }}..."
          for i in {1..60}; do
            if curl -sf http://localhost:${{ env.FRONTEND_PORT }}/login > /dev/null 2>&1; then
              echo "Frontend ready"
              exit 0
            fi
            echo "Waiting for frontend... ($i/60)"
            sleep 3
          done
          echo "ERROR: Frontend failed to start. Logs:"
          cat frontend.log
          exit 1

      - name: Run E2E tests
        run: cd frontend && pnpm test:e2e
        env:
          E2E_BACKEND_URL: http://localhost:${{ env.BACKEND_PORT }}
          E2E_FRONTEND_URL: http://localhost:${{ env.FRONTEND_PORT }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            backend.log
            frontend.log
          retention-days: 7

      - name: Cleanup processes
        if: always()
        run: |
          [ -f backend.pid ] && kill $(cat backend.pid) 2>/dev/null || true
          [ -f frontend.pid ] && kill $(cat frontend.pid) 2>/dev/null || true
