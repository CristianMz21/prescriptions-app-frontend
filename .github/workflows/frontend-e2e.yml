name: Frontend E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: frontend-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "11.1.1"
  BACKEND_PORT: 3000
  FRONTEND_PORT: 3001

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: prescriptions_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: CristianMz21/prescriptions-app-backend
          path: backend

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Approve frontend build scripts
        run: pnpm approve-builds --all
        working-directory: ./frontend/prescriptions-app

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./frontend/prescriptions-app

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: ./frontend/prescriptions-app

      - name: Approve backend build scripts
        run: pnpm approve-builds --all
        working-directory: ./backend

      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./backend

      - name: Set backend environment
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/prescriptions_test?schema=public
          JWT_ACCESS_SECRET: test-access-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci
          JWT_ACCESS_TTL: 15m
          JWT_REFRESH_TTL: 7d
          FRONTEND_URL: http://localhost:${{ env.FRONTEND_PORT }}
          APP_ORIGIN: http://localhost:${{ env.FRONTEND_PORT }}
          NODE_ENV: test
          PORT: ${{ env.BACKEND_PORT }}
        run: |
          cd backend
          printf '%s\n' \
            "DATABASE_URL=$DATABASE_URL" \
            "JWT_ACCESS_SECRET=$JWT_ACCESS_SECRET" \
            "JWT_REFRESH_SECRET=$JWT_REFRESH_SECRET" \
            "JWT_ACCESS_TTL=$JWT_ACCESS_TTL" \
            "JWT_REFRESH_TTL=$JWT_REFRESH_TTL" \
            "FRONTEND_URL=$FRONTEND_URL" \
            "APP_ORIGIN=$APP_ORIGIN" \
            "NODE_ENV=$NODE_ENV" \
            "PORT=$PORT" \
            > .env

      - name: Set frontend environment
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:${{ env.BACKEND_PORT }}
        run: |
          cd frontend/prescriptions-app
          printf '%s\n' "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" > .env.local

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "PostgreSQL ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          echo "ERROR: PostgreSQL failed to start"
          exit 1

      - name: Prisma generate
        run: pnpm exec prisma generate
        working-directory: ./backend

      - name: Run Prisma migrations
        run: pnpm exec prisma migrate deploy
        working-directory: ./backend

      - name: Run Prisma seed
        run: pnpm exec prisma db seed
        working-directory: ./backend

      - name: Start backend
        run: |
          pnpm start:dev > ../backend.log 2>&1 &
          echo $! > ../backend.pid
          echo "Backend PID: $(cat ../backend.pid)"
        working-directory: ./backend

      - name: Wait for backend readiness
        run: |
          echo "Waiting for backend on port ${{ env.BACKEND_PORT }}..."
          for i in {1..60}; do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:${{ env.BACKEND_PORT }}/ 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" != "000" ] && [ "$HTTP_CODE" != "401" ]; then
              echo "Backend ready (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Waiting for backend... ($i/60) last code: $HTTP_CODE"
            sleep 3
          done
          echo "ERROR: Backend failed to start. Logs:"
          cat ../backend.log
          exit 1

      - name: Check backend for errors
        run: |
          if grep -qi "Exception\|FATAL\|Unable to connect" ../backend.log; then
            echo "ERROR: Backend startup issues detected:"
            grep -i "Exception\|FATAL\|Unable to connect" ../backend.log | head -20
            exit 1
          fi

      - name: Start frontend
        run: |
          pnpm exec next dev -H 127.0.0.1 -p ${{ env.FRONTEND_PORT }} > ../frontend.log 2>&1 &
          echo $! > ../frontend.pid
          echo "Frontend PID: $(cat ../frontend.pid)"
        working-directory: ./frontend/prescriptions-app

      - name: Wait for frontend login page
        run: |
          echo "Waiting for frontend on port ${{ env.FRONTEND_PORT }}..."
          for i in {1..60}; do
            if curl -sf -o /dev/null http://127.0.0.1:${{ env.FRONTEND_PORT }}/login 2>/dev/null; then
              echo "Frontend ready"
              exit 0
            fi
            echo "Waiting for frontend... ($i/60)"
            sleep 3
          done
          echo "ERROR: Frontend failed to start. Logs:"
          cat ../frontend.log
          exit 1

      - name: Verify seed credentials in test fixtures
        run: |
          CREDENTIALS=$(grep -r "admin@test.com\|doctor@test.com\|patient@test.com" . --include="*.ts" --include="*.tsx" 2>/dev/null | grep -v node_modules | head -5 || true)
          if [ -z "$CREDENTIALS" ]; then
            echo "WARNING: Could not find standard seed credentials in tests"
          else
            echo "Found credentials references:"
            echo "$CREDENTIALS"
          fi
        working-directory: ./frontend/prescriptions-app

      - name: Run E2E tests
        run: pnpm test:e2e
        working-directory: ./frontend/prescriptions-app

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: |
            frontend/prescriptions-app/playwright-report/
            frontend/prescriptions-app/test-results/
          retention-days: 7

      - name: Upload backend logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs-${{ github.run_number }}
          path: backend.log
          retention-days: 7

      - name: Upload frontend logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-logs-${{ github.run_number }}
          path: frontend.log
          retention-days: 7

      - name: Cleanup processes
        if: always()
        run: |
          [ -f backend.pid ] && kill $(cat backend.pid) 2>/dev/null || true
          [ -f frontend.pid ] && kill $(cat frontend.pid) 2>/dev/null || true