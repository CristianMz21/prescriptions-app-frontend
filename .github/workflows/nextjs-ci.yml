name: Next.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '11.1.1'

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Approve build scripts
        run: pnpm approve-builds esbuild sharp unrs-resolver

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Next.js cache
        uses: actions/cache@v4
        id: next-cache
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'src/**/*.css') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-$

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v44
        with:
          files: |
            src/**
            app/**
            components/**
            lib/**

      - name: Format check
        if: steps.changed.outputs.any_changed == 'true'
        run: pnpm format

      - name: Lint
        if: steps.changed.outputs.any_changed == 'true'
        run: pnpm lint

      - name: Typecheck
        if: steps.changed.outputs.any_changed == 'true'
        run: pnpm typecheck

      - name: Unit tests
        if: steps.changed.outputs.any_changed == 'true' && hashFiles('vitest.config.*') != ''
        run: pnpm test

      - name: Test coverage
        if: steps.changed.outputs.any_changed == 'true' && hashFiles('vitest.config.*') != ''
        run: pnpm test:coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: E2E tests
        if: steps.changed.outputs.any_changed == 'true' && hashFiles('playwright.config.*') != ''
        run: pnpm exec playwright test
        continue-on-error: true

      - name: Build
        if: steps.changed.outputs.any_changed == 'true'
        run: pnpm build

      - name: Upload build artifact
        if: steps.changed.outputs.any_changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            .next/
            !node_modules/
          retention-days: 1