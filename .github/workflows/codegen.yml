name: API Codegen

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "11.1.1"
  # Source of truth for the OpenAPI schema — fetched from the backend repo.
  BACKEND_OPENAPI_URL: https://raw.githubusercontent.com/CristianMz21/prescriptions-app-backend/main/openapi.json

jobs:
  codegen:
    name: Generate API client + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: frontend

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Approve build scripts
        run: cd frontend && pnpm approve-builds --all

      - name: Install dependencies
        run: cd frontend && pnpm install

      - name: Fetch backend OpenAPI schema
        run: |
          mkdir -p backend
          curl --fail --silent --show-error \
            -o backend/openapi.json \
            "${BACKEND_OPENAPI_URL}"
          test -s backend/openapi.json

      - name: Harden OpenAPI schema
        run: python3 frontend/scripts/harden-schema.py backend/openapi.json

      - name: Regenerate API client
        run: cd frontend && pnpm api:refresh

      - name: Fail if generated client is stale
        run: |
          cd frontend
          if ! git diff --exit-code src/lib/api/generated; then
            echo "::error::Generated API client is stale. Run 'pnpm api:refresh' locally and commit the result."
            exit 1
          fi

      - name: Typecheck
        run: cd frontend && pnpm run typecheck

      - name: Lint
        run: cd frontend && pnpm run lint

      - name: Test
        run: cd frontend && pnpm run test
