name: Frontend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "11.1.1"
  BACKEND_OPENAPI_URL: https://raw.githubusercontent.com/CristianMz21/prescriptions-app-backend/main/openapi.json

jobs:
  frontend-static-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Approve build scripts
        run: pnpm approve-builds --all

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch backend OpenAPI schema
        run: |
          mkdir -p ../../backend
          curl --fail --silent --show-error \
            -o ../../backend/openapi.json \
            "${BACKEND_OPENAPI_URL}"

      - name: Harden OpenAPI schema
        run: python3 scripts/harden-schema.py ../../backend/openapi.json

      - name: Regenerate Orval client
        run: pnpm api:refresh

      - name: Check generated API drift
        run: git diff --exit-code src/lib/api/generated

      - name: TypeScript check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  forbidden-pattern-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Scan for forbidden patterns
        run: |
          patterns=("@ts-ignore" "eslint-disable" ".skip(" ".only(" "# noqa" "type: ignore")
          found=0
          for pattern in "${patterns[@]}"; do
            matches=$(grep -r --include="*.ts" --include="*.tsx" "$pattern" . --exclude-dir=node_modules --exclude-dir=src/lib/api/generated --exclude-dir=coverage 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo "Found forbidden pattern: $pattern"
              echo "$matches"
              found=1
            fi
          done
          if [ $found -eq 1 ]; then
            echo "ERROR: Forbidden patterns detected. Fix them before merging."
            exit 1
          fi
          echo "No forbidden patterns found."

  frontend-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: prescriptions_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Approve build scripts
        run: pnpm approve-builds --all

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Set backend environment
        run: |
          cat >> .env.backend << EOF
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/prescriptions_test?schema=public
          JWT_ACCESS_SECRET=test-access-secret-for-ci
          JWT_REFRESH_SECRET=test-refresh-secret-for-ci
          JWT_ACCESS_TTL=15m
          JWT_REFRESH_TTL=7d
          FRONTEND_URL=http://localhost:3001
          APP_ORIGIN=http://localhost:3001
          NODE_ENV=test
          PORT=3000
          EOF

      - name: Set frontend environment
        run: |
          cat >> .env.local << EOF
          NEXT_PUBLIC_API_URL=http://127.0.0.1:3000
          EOF

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "PostgreSQL ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - name: Start backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/prescriptions_test?schema=public
          JWT_ACCESS_SECRET: test-access-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci
          JWT_ACCESS_TTL: 15m
          JWT_REFRESH_TTL: 7d
          FRONTEND_URL: http://localhost:3001
          APP_ORIGIN: http://localhost:3001
          NODE_ENV: test
          PORT: 3000
          SEED_DEFAULT_PASSWORD: Password123!
        run: |
          git clone --depth 1 https://github.com/CristianMz21/prescriptions-app-backend.git ../backend
          python3 scripts/harden-schema.py ../backend/openapi.json
          cd ../backend
          pnpm install --frozen-lockfile
          pnpm exec prisma generate
          pnpm exec prisma migrate deploy
          pnpm exec prisma db seed
          pnpm start:dev > ../backend.log 2>&1 &
          echo $! > ../backend.pid

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:3000/auth/profile > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 3
          done

      - name: Start frontend
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:3000
        run: |
          pnpm build
          pnpm exec next start -p 3001 > frontend.log 2>&1 &
          echo $! > frontend.pid

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:3001/login > /dev/null 2>&1; then
              echo "Frontend ready"
              break
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 3
          done

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: .playwright/traces/
          retention-days: 7

      - name: Upload Playwright videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: test-results/
          retention-days: 7

      - name: Upload backend logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs
          path: backend.log
          retention-days: 7

      - name: Upload frontend logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-logs
          path: frontend.log
          retention-days: 7
