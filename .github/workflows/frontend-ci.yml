name: CI

on:
  pull_request:
    branches: [main]
  # Re-run on push to main so SonarCloud re-baselines after each merge.
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "11.1.1"
  BACKEND_OPENAPI_URL: https://raw.githubusercontent.com/CristianMz21/prescriptions-app-backend/main/openapi.json

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Third-party actions pinned to commit SHAs (Sonar S7637).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Approve build scripts
        run: pnpm approve-builds --all
      - name: Install dependencies (frozen)
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Approve build scripts
        run: pnpm approve-builds --all
      - name: Install dependencies (frozen)
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck

  unit-coverage:
    name: Unit Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Approve build scripts
        run: pnpm approve-builds --all
      - name: Install dependencies (frozen)
        run: pnpm install --frozen-lockfile
      - name: Tests with coverage
        # `pnpm test:coverage` runs vitest with v8 thresholds. The vitest
        # config enforces 80% branches/functions/lines/statements — drop
        # below that and the job fails.
        run: pnpm test:coverage
      - name: Upload lcov for SonarCloud
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Approve build scripts
        run: pnpm approve-builds --all
      - name: Install dependencies (frozen)
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build

  codegen-drift:
    # Regenerates the Orval client from the backend's HEAD-of-main OpenAPI
    # spec and fails the build if the committed client is stale. Keeping
    # the generated client in-repo lets lint/typecheck/test consume it
    # without re-running Orval in every job.
    name: Codegen Drift
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Approve build scripts
        run: pnpm approve-builds --all
      - name: Install dependencies (frozen)
        run: pnpm install --frozen-lockfile
      - name: Fetch backend OpenAPI schema
        run: |
          mkdir -p ../backend
          curl --fail --silent --show-error \
            -o ../backend/openapi.json \
            "${BACKEND_OPENAPI_URL}"
          test -s ../backend/openapi.json
      - name: Harden OpenAPI schema
        run: python3 scripts/harden-schema.py ../backend/openapi.json
      - name: Regenerate API client
        run: pnpm api:refresh
        env:
          OPENAPI_SPEC_PATH: ../backend/openapi.json
      - name: Fail if generated client is stale
        run: |
          if ! git diff --exit-code src/lib/api/generated; then
            echo "::error::Generated API client is stale."
            echo "::error::Run 'pnpm api:refresh' locally and commit the regenerated client."
            exit 1
          fi

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BACKEND_PORT: 3000
      FRONTEND_PORT: 3001
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: prescriptions_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout frontend
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: frontend
      - name: Checkout backend (HEAD of main)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: CristianMz21/prescriptions-app-backend
          ref: main
          path: backend
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Harden backend OpenAPI schema
        run: python3 frontend/scripts/harden-schema.py backend/openapi.json
      - name: Approve build scripts (frontend)
        run: cd frontend && pnpm approve-builds --all
      - name: Install frontend dependencies (frozen)
        run: cd frontend && pnpm install --frozen-lockfile
      - name: Install backend dependencies (frozen)
        run: cd backend && pnpm install --frozen-lockfile
      - name: Generate Prisma client (required before TS compile)
        # `@prisma/client` ships only stub types until `prisma generate` runs;
        # without this, the backend's `nest build` errors with `Module
        # "@prisma/client/default" has no exported member 'Role'` etc.
        run: cd backend && pnpm exec prisma generate
      - name: Install Puppeteer Chrome (required by backend PdfService)
        # Backend's PdfService uses Puppeteer to render PDF prescriptions.
        # Without Chrome in the puppeteer cache, every `GET
        # /prescriptions/:id/pdf` returns 500 ("Could not find Chrome
        # ver. X"). Observed in runs #25910559603 onwards as the cause
        # of patient PDF + patient consume flow failures.
        run: cd backend && pnpm exec puppeteer browsers install chrome
      - name: Install Playwright chromium (with system deps)
        run: cd frontend && pnpm exec playwright install --with-deps chromium
      - name: Wait for PostgreSQL
        run: |
          set -e
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "PostgreSQL ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          echo "::error::PostgreSQL never became ready"
          exit 1
      - name: Build backend (seed runs against compiled output)
        # The backend's `prisma.seed` field in package.json is
        # `node dist/prisma/seed.js` (introduced for Render boot), so the
        # seed step below depends on the compiled bundle existing.
        run: cd backend && pnpm build
      - name: Reset + migrate + seed (deterministic)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/prescriptions_test?schema=public
          JWT_ACCESS_SECRET: test-access-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci
          JWT_ACCESS_TTL: 15m
          JWT_REFRESH_TTL: 7d
          # Hostname coordination (test env only): cookies set with
          # SameSite=Lax must come from the same registrable host the
          # browser is talking to. The browser origin (Playwright baseURL,
          # via E2E_FRONTEND_URL below) and the API origin (NEXT_PUBLIC_API_URL
          # baked into the production build) BOTH use 127.0.0.1 — so the
          # backend's CORS allowlist + Set-Cookie domain must match.
          # Mixing `localhost` and `127.0.0.1` was the cause of every
          # login-using test failing at the waitForResponse for
          # /auth/profile in runs #25899822561 → #25908060243.
          FRONTEND_URL: http://127.0.0.1:3001
          APP_ORIGIN: http://127.0.0.1:3001
          NODE_ENV: test
          SEED_DEFAULT_PASSWORD: Password123!
          # Lowest-cost bcrypt rounds for the test fixture only. Production
          # default (10) is unchanged. The backend silently clamps any value
          # outside [4, 15] back to 10, so this can never accidentally
          # weaken a non-test environment. Drops seed wall-time ~10s and
          # makes every login bcrypt.compare ~5ms instead of ~100ms-1s.
          BCRYPT_SALT_ROUNDS: 4
        run: |
          cd backend
          # `migrate reset --force --skip-seed` drops + re-creates the schema
          # so every CI run starts from byte-identical DB state. Avoids
          # flakes caused by leaked migrations between job retries.
          pnpm exec prisma migrate reset --force --skip-seed
          pnpm exec prisma migrate deploy
          pnpm exec prisma db seed
      - name: Start backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/prescriptions_test?schema=public
          JWT_ACCESS_SECRET: test-access-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci
          JWT_ACCESS_TTL: 15m
          JWT_REFRESH_TTL: 7d
          # Hostname coordination (test env only): cookies set with
          # SameSite=Lax must come from the same registrable host the
          # browser is talking to. The browser origin (Playwright baseURL,
          # via E2E_FRONTEND_URL below) and the API origin (NEXT_PUBLIC_API_URL
          # baked into the production build) BOTH use 127.0.0.1 — so the
          # backend's CORS allowlist + Set-Cookie domain must match.
          # Mixing `localhost` and `127.0.0.1` was the cause of every
          # login-using test failing at the waitForResponse for
          # /auth/profile in runs #25899822561 → #25908060243.
          FRONTEND_URL: http://127.0.0.1:3001
          APP_ORIGIN: http://127.0.0.1:3001
          NODE_ENV: test
          PORT: ${{ env.BACKEND_PORT }}
          SEED_DEFAULT_PASSWORD: Password123!
          # Match the seed step — login bcrypt.compare uses the same rounds
          # as the stored hash. Mismatch would silently bcrypt-validate at
          # the higher cost factor and re-introduce the per-login bottleneck.
          BCRYPT_SALT_ROUNDS: 4
        run: |
          cd backend
          pnpm start:dev > ../backend.log 2>&1 &
          echo $! > ../backend.pid
      - name: Wait for backend readiness (strict 401 on /auth/profile)
        # /auth/profile is guarded — we only accept the precise unauth
        # response (401) as readiness. A 000/404/500 means the server
        # is not actually serving the route stack yet.
        run: |
          for i in {1..60}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:${BACKEND_PORT}/auth/profile || echo "000")
            if [ "$CODE" = "401" ]; then
              echo "Backend ready (HTTP $CODE on /auth/profile)"
              exit 0
            fi
            echo "Waiting for backend... ($i/60) last code: $CODE"
            sleep 3
          done
          echo "::error::Backend never reached HTTP 401 on /auth/profile. Logs:"
          cat backend.log
          exit 1
      - name: Regenerate API client from local backend
        env:
          OPENAPI_SPEC_PATH: ../backend/openapi.json
        run: cd frontend && pnpm api:refresh
      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:${{ env.BACKEND_PORT }}
        run: cd frontend && pnpm build
      - name: Start frontend (production)
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:${{ env.BACKEND_PORT }}
        run: |
          cd frontend
          # Bind explicitly to 127.0.0.1 so the browser + backend both use
          # the same loopback hostname. Without -H, Next listens on 0.0.0.0
          # and Playwright's baseURL=http://127.0.0.1:3001 works fine, but
          # the hostname-mismatch comment on the seed step still applies.
          pnpm exec next start -H 127.0.0.1 -p ${{ env.FRONTEND_PORT }} > ../frontend.log 2>&1 &
          echo $! > ../frontend.pid
      - name: Wait for frontend readiness (strict 200 on /login)
        run: |
          for i in {1..60}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:${FRONTEND_PORT}/login || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "Frontend ready (HTTP $CODE on /login)"
              exit 0
            fi
            echo "Waiting for frontend... ($i/60) last code: $CODE"
            sleep 3
          done
          echo "::error::Frontend never reached HTTP 200 on /login. Logs:"
          cat frontend.log
          exit 1
      - name: Run Playwright E2E
        env:
          # Both URLs use 127.0.0.1 to match NEXT_PUBLIC_API_URL baked into
          # the build + the Set-Cookie domain on backend responses. See the
          # comment block on the `Reset + migrate + seed` step.
          E2E_BACKEND_URL: http://127.0.0.1:${{ env.BACKEND_PORT }}
          E2E_FRONTEND_URL: http://127.0.0.1:${{ env.FRONTEND_PORT }}
        run: cd frontend && pnpm test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
      - name: Upload Playwright traces & test-results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 7
      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: server-logs
          path: |
            backend.log
            frontend.log
          retention-days: 7
      - name: Cleanup background processes
        if: always()
        run: |
          [ -f backend.pid ] && kill "$(cat backend.pid)" 2>/dev/null || true
          [ -f frontend.pid ] && kill "$(cat frontend.pid)" 2>/dev/null || true

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: unit-coverage
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Download coverage artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: coverage-lcov
          path: coverage
      - name: SonarCloud Scan (block on Quality Gate)
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

  forbidden-patterns:
    name: Forbidden Patterns
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Scan for unsafe shortcuts
        # Banned across the repo (excluding generated client and Next/coverage
        # build output): .skip(, .only(, @ts-ignore, @ts-expect-error,
        # eslint-disable, NOSONAR, `as any`, `: any`, `<any>`. Every hit
        # fails the job. No continue-on-error, no path-based skipping.
        run: |
          set -uo pipefail
          patterns=(
            '\.skip\('
            '\.only\('
            '@ts-ignore'
            '@ts-expect-error'
            'eslint-disable'
            'NOSONAR'
            '\bas any\b'
            ': any\b'
            '<any>'
          )
          violations=0
          for p in "${patterns[@]}"; do
            if grep -rnE --include='*.ts' --include='*.tsx' "$p" . \
                 --exclude-dir=node_modules \
                 --exclude-dir=.next \
                 --exclude-dir=coverage \
                 --exclude-dir=playwright-report \
                 --exclude-dir=test-results \
                 --exclude-dir=src/lib/api/generated; then
              echo "::error::Forbidden pattern detected: $p"
              violations=$((violations + 1))
            fi
          done
          if [ "$violations" -gt 0 ]; then
            echo "::error::$violations forbidden-pattern category(ies) hit. Fix at root."
            exit 1
          fi
          echo "All forbidden-pattern gates clean."
